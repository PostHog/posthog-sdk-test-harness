name: PostHog SDK Compliance Tests

on:
  workflow_call:
    inputs:
      adapter-dockerfile:
        description: "Path to the SDK adapter Dockerfile"
        required: true
        type: string
      adapter-context:
        description: "Build context for the adapter (directory containing Dockerfile)"
        required: false
        type: string
        default: "."
      test-harness-version:
        description: "Version of the test harness to use (e.g., 'latest', '1.0', '1.0.0'). Ignored when test-harness-context is set."
        required: false
        type: string
        default: "latest"
      test-harness-context:
        description: "Path inside the checked-out SDK repo to build the test harness Dockerfile from. When set, the harness is built from local source instead of pulled from the registry — used for in-repo self-tests so contract/mock changes get exercised against the example adapters in the same PR."
        required: false
        type: string
        default: ""
      concurrency:
        description: "Number of tests to run in parallel (requires parallel-capable adapter)"
        required: false
        type: number
        default: 1
      report-name:
        description: "Name for the test report artifact"
        required: false
        type: string
        default: "sdk-compliance-report"
    outputs:
      tests-passed:
        description: "Whether all tests passed"
        value: ${{ jobs.test.outputs.tests-passed }}
      report-path:
        description: "Path to the test report"
        value: ${{ jobs.test.outputs.report-path }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      pull-requests: write
    outputs:
      tests-passed: ${{ steps.run-tests.outcome == 'success' }}
      report-path: "sdk-compliance-report.md"

    steps:
      - name: Checkout SDK repository
        uses: actions/checkout@v4
        with:
          path: sdk-repo

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up test harness image
        env:
          HARNESS_VERSION: ${{ inputs.test-harness-version }}
          HARNESS_CONTEXT: ${{ inputs.test-harness-context }}
        run: |
          if [ -n "$HARNESS_CONTEXT" ]; then
            docker build -t harness:test "sdk-repo/$HARNESS_CONTEXT"
          else
            docker pull "ghcr.io/posthog/sdk-test-harness:$HARNESS_VERSION"
            docker tag "ghcr.io/posthog/sdk-test-harness:$HARNESS_VERSION" harness:test
          fi

      - name: Build SDK adapter
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: sdk-repo/${{ inputs.adapter-context }}
          file: sdk-repo/${{ inputs.adapter-context }}/${{ inputs.adapter-dockerfile }}
          tags: sdk-adapter:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Docker network
        run: docker network create test-network

      - name: Start SDK adapter
        run: |
          docker run -d \
            --name sdk-adapter \
            --network test-network \
            -e PORT=8080 \
            sdk-adapter:test

      - name: Create report directory
        run: mkdir -p "${GITHUB_WORKSPACE}/report"

      - name: Run tests
        id: run-tests
        continue-on-error: true
        env:
          CONCURRENCY: ${{ inputs.concurrency }}
        run: |
          CONCURRENCY_ARG=""
          if [ "${CONCURRENCY}" -gt 1 ]; then
            CONCURRENCY_ARG="--concurrency ${CONCURRENCY}"
          fi

          docker run --rm \
            --name test-harness \
            --network test-network \
            -v "${GITHUB_WORKSPACE}/report:/report" \
            harness:test \
            run \
            --adapter-url http://sdk-adapter:8080 \
            --mock-url http://test-harness:8081 \
            --output text \
            --report /report/sdk-compliance-report.md \
            $CONCURRENCY_ARG

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.report-name }}
          path: report/sdk-compliance-report.md

      - name: Extract SDK name from report
        id: extract-sdk-name
        if: always()
        run: |
          if [ -f "${GITHUB_WORKSPACE}/report/sdk-compliance-report.md" ]; then
            # Extract SDK name from the first line of the report (e.g., "# posthog-js Compliance Report")
            SDK_NAME=$(head -n 1 "${GITHUB_WORKSPACE}/report/sdk-compliance-report.md" | sed 's/# \(.*\) Compliance Report/\1/' | tr -d ' ')
            echo "sdk-name=${SDK_NAME}" >> $GITHUB_OUTPUT
          else
            echo "sdk-name=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          REPORT_PATH: ${{ github.workspace }}/report/sdk-compliance-report.md
          SDK_NAME: ${{ steps.extract-sdk-name.outputs.sdk-name }}
        with:
          script: |
            const fs = require('fs');
            const reportPath = process.env.REPORT_PATH;

            if (!fs.existsSync(reportPath)) {
              console.log('Report file not found, skipping PR comment');
              return;
            }

            const report = fs.readFileSync(reportPath, 'utf8');
            const sdkName = process.env.SDK_NAME || 'unknown';
            // Use SDK-specific marker so multiple adapters don't overwrite each other
            const commentMarker = `<!-- posthog-sdk-compliance-report-${sdkName} -->`;
            const body = `${commentMarker}\n${report}`;

            // Find existing comment for this specific SDK
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(comment =>
              comment.body.includes(commentMarker)
            );

            if (existingComment) {
              // Update existing comment for this SDK
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
              console.log(`Updated existing comment for ${sdkName}`);
            } else {
              // Create new comment for this SDK
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
              console.log(`Created new comment for ${sdkName}`);
            }

      - name: Stop containers
        if: always()
        run: |
          docker stop sdk-adapter || true
          docker rm sdk-adapter || true
          docker network rm test-network || true

      - name: Warn if tests failed
        if: steps.run-tests.outcome != 'success'
        run: echo "::warning::SDK compliance tests failed. See the test report for details."

      # TODO: Uncomment when SDK compliance tests are stable and should block PRs
      # - name: Fail if tests failed
      #   if: steps.run-tests.outcome != 'success'
      #   run: exit 1
