name: Test Example Adapters

permissions:
  contents: read
  packages: read
  pull-requests: write

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-minimal-adapter:
    name: Test the minimal adapter example
    uses: ./.github/workflows/test-sdk-action.yml
    with:
      adapter-dockerfile: "Dockerfile"
      adapter-context: "examples/minimal_adapter"
      # Build the harness from this PR's source so contract/mock changes are
      # exercised against the example adapters in the same PR.
      test-harness-context: "."
      report-name: "sdk-compliance-report-minimal"

  test-parallel-adapter:
    name: Test the parallel adapter example (concurrency=4)
    uses: ./.github/workflows/test-sdk-action.yml
    with:
      adapter-dockerfile: "Dockerfile"
      adapter-context: "examples/parallel_adapter"
      test-harness-context: "."
      concurrency: 4
      report-name: "sdk-compliance-report-parallel"
