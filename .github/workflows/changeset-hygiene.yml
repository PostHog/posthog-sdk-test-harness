name: 'Changeset hygiene'

# Enforces that PRs touching releasable code include a Sampo changeset.
# Without a changeset, the gated `Release` workflow has nothing to publish.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: changeset-hygiene-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    uses: PostHog/.github/.github/workflows/changeset-hygiene.yml@5fc4680761e8ac29a61b212756230eba0e276d8c
