      compression:
        description: Compression support (each test requires specific encoding capability)
        tests:
          - name: sends_gzip_content_encoding
            description: Content-Encoding gzip header when gzip enabled
            requires: encoding_gzip
            steps:
              - action: init
                params:
                  enable_compression: true
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_request_has_header
                params:
                  header: Content-Encoding
                  expected: gzip

          - name: sends_deflate_content_encoding
            description: Content-Encoding deflate header when deflate enabled
            requires: encoding_deflate
            steps:
              - action: init
                params:
                  enable_compression: true
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_request_has_header
                params:
                  header: Content-Encoding
                  expected: deflate

          - name: sends_br_content_encoding
            description: Content-Encoding br header when brotli enabled
            requires: encoding_br
            steps:
              - action: init
                params:
                  enable_compression: true
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_request_has_header
                params:
                  header: Content-Encoding
                  expected: br

          - name: sends_zstd_content_encoding
            description: Content-Encoding zstd header when zstd enabled
            requires: encoding_zstd
            steps:
              - action: init
                params:
                  enable_compression: true
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_request_has_header
                params:
                  header: Content-Encoding
                  expected: zstd

          - name: no_content_encoding_when_disabled
            description: No Content-Encoding header when compression disabled
            steps:
              - action: init
                params:
                  enable_compression: false
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_header_absent
                params:
                  header: Content-Encoding

          - name: compressed_body_is_decompressible
            description: Mock server can decompress and parse the gzip body
            requires: encoding_gzip
            steps:
              - action: init
                params:
                  enable_compression: true
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_compressed_body_decompressible

      error_handling:
        description: Error response handling beyond core retry behavior
        tests:
          - name: does_not_retry_on_unknown_4xx
            description: No retry on 403 (unknown 4xx treated as non-retryable)
            steps:
              - action: configure_mock_responses
                params:
                  responses:
                    - status_code: 403
                      body: '{"error":"forbidden","error_description":"Forbidden","error_uri":"https://posthog.com/docs/api"}'
              - action: init
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: wait
                params:
                  duration_ms: 2000
              - action: assert_request_count
                params:
                  expected: 1
