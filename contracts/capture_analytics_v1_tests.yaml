            description: EventOptions overrides are carried for events in a multi-event batch
            steps:
              - action: init
                params:
                  flush_at: 3
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user_{index}
                    event: test_event_{index}
                    options:
                      cookieless_mode: true
              - action: flush
              - action: assert_request_count
                params:
                  expected: 1
              - action: assert_events_in_batch_count
                params:
                  expected: 3
              - action: assert_event_option
                params:
                  option: cookieless_mode
                  expected: true

      geoip_and_historical_migration:
        description: disable_geoip injection and historical_migration body flag (V1)
        tests:
          - name: geoip_disable_injected_into_properties
            description: disable_geoip init option injects $geoip_disable into event properties
            steps:
              - action: init
                params:
                  flush_at: 1
                  disable_geoip: true
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_event_property
                params:
                  property: $geoip_disable
                  expected: true

          - name: historical_migration_set_in_body
            description: historical_migration init option sets historical_migration in the V1 request body
            steps:
              - action: init
                params:
                  flush_at: 1
                  historical_migration: true
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_body_field
                params:
                  field: historical_migration
                  expected: true

          - name: historical_migration_absent_by_default
            description: historical_migration is not present in the body when not configured
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_body_field_absent
                params:
                  fields:
                    - historical_migration

