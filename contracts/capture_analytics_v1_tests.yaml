    description: Tests for Capture Analytics V1 wire protocol compliance (POST /i/v1/analytics/events)
    requires: capture_v1
    categories:
      endpoint_and_method:
        description: SDK targets the correct V1 endpoint
        tests:
          - name: targets_v1_endpoint
            description: V1 SDK sends requests to POST /i/v1/analytics/events
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_request_count
                params:
                  expected: 1
              - action: assert_request_path
                params:
                  expected: /i/v1/analytics/events

          - name: does_not_use_legacy_endpoints
            description: V1 SDK does not send requests to legacy capture endpoints
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_request_count
                params:
                  expected: 1
              - action: assert_no_requests_to_paths
                params:
                  paths:
                    - /batch
                    - /e
                    - /capture
                    - /track
                    - /i/v0/e

      required_headers:
        description: All V1-required headers are present and well-formed
        tests:
          - name: has_authorization_bearer_header
            description: Authorization header uses Bearer scheme with the configured API key
            steps:
              - action: init
                params:
                  api_key: phc_test_key
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_authorization_bearer_token
                params:
                  expected: phc_test_key

          - name: has_content_type_json
            description: Content-Type header is application/json
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_header_value_matches
                params:
                  header: Content-Type
                  pattern: "^application/json"

          - name: has_posthog_sdk_info_format
            description: PostHog-Sdk-Info header matches name/version pattern
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_header_value_matches
                params:
                  header: PostHog-Sdk-Info
                  pattern: "^.+/.+$"

          - name: has_posthog_attempt_header
            description: PostHog-Attempt header is 1 on first (non-retry) request
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_header_is_integer
                params:
                  header: PostHog-Attempt
                  expected: 1

          - name: has_posthog_request_id
            description: PostHog-Request-Id header is a valid UUID
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_header_is_uuid
                params:
                  header: PostHog-Request-Id

          - name: has_posthog_request_timestamp
            description: PostHog-Request-Timestamp header is valid RFC 3339
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_header_is_rfc3339
                params:
                  header: PostHog-Request-Timestamp

          - name: has_user_agent
            description: User-Agent header is present and non-empty
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_header_value_matches
                params:
                  header: User-Agent
                  pattern: "^.+$"

      body_format:
        description: Request body conforms to the V1 batch schema
        tests:
          - name: body_has_created_at_and_batch
            description: Root created_at field is valid RFC 3339 and batch is a non-empty array
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_v1_body_format

          - name: no_api_key_in_body
            description: Body does not contain api_key or token fields (auth is in headers only)
            steps:
              - action: init
                params:
                  api_key: phc_test_key
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_body_field_absent
                params:
                  fields:
                    - api_key
                    - token

          - name: no_sent_at_in_body
            description: Body does not contain sent_at field (replaced by PostHog-Request-Timestamp header)
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_body_field_absent
                params:
                  fields:
                    - sent_at

      event_format:
        description: Individual events conform to V1 event schema
        tests:
          - name: event_has_required_root_fields
            description: Each event has event, uuid, distinct_id, timestamp at root
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_v1_event_format

          - name: event_uuid_is_valid
            description: Event uuid is a valid UUID
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_uuid_format
                params:
                  field: uuid

          - name: event_timestamp_is_rfc3339
            description: Event timestamp is a valid RFC 3339 timestamp
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_event_field_is_rfc3339
                params:
                  field: timestamp

          - name: distinct_id_is_string
            description: Event distinct_id is a string
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user_123
                  event: test_event
              - action: flush
              - action: assert_event_field_is_string
                params:
                  field: distinct_id

          - name: distinct_id_at_root_not_properties
            description: distinct_id is at event root, not in properties
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_event_field_not_in_properties
                params:
                  field: distinct_id

          - name: custom_properties_preserved
            description: Custom properties in properties object are sent unchanged
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
                  properties:
                    custom_string: "hello"
                    custom_number: 42
                    custom_bool: true
              - action: flush
              - action: assert_event_property
                params:
                  property: custom_string
                  expected: "hello"
              - action: assert_event_property
                params:
                  property: custom_number
                  expected: 42
              - action: assert_event_property
                params:
                  property: custom_bool
                  expected: true

          - name: set_properties_preserved
            description: $set in properties is sent as an object
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
                  properties:
                    $set:
                      name: "Test User"
                      email: "test@example.com"
              - action: flush
              - action: assert_event_property_is_object
                params:
                  property: $set

          - name: set_once_properties_preserved
            description: $set_once in properties is sent as an object
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
                  properties:
                    $set_once:
                      initial_referrer: "https://google.com"
              - action: flush
              - action: assert_event_property_is_object
                params:
                  property: $set_once

          - name: groups_properties_preserved
            description: $groups in properties is sent as an object
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
                  properties:
                    $groups:
                      company: "posthog"
              - action: flush
              - action: assert_event_property_is_object
                params:
                  property: $groups

          - name: sdk_generates_uuid_if_not_provided
            description: SDK generates a UUID when caller does not supply one
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_event_has_field
                params:
                  field: uuid
              - action: assert_uuid_format
                params:
                  field: uuid

          # Batch (multi-event) variants. These send several events in a single
          # request so the per-event schema is validated under batching, not just
          # for a lone event. assert_v1_event_format checks every event in the
          # batch; the remaining assertions check the first event.
          - name: event_has_required_root_fields_batch
            description: Each event in a multi-event batch has event, uuid, distinct_id, timestamp at root
            steps:
              - action: init
                params:
                  flush_at: 3
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user_{index}
                    event: test_event_{index}
              - action: flush
              - action: assert_request_count
                params:
                  expected: 1
              - action: assert_events_in_batch_count
                params:
                  expected: 3
              - action: assert_v1_event_format

          - name: event_uuid_is_valid_batch
            description: Event uuid is a valid UUID in a multi-event batch
            steps:
              - action: init
                params:
                  flush_at: 3
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user_{index}
                    event: test_event_{index}
              - action: flush
              - action: assert_uuid_format
                params:
                  field: uuid

          - name: event_timestamp_is_rfc3339_batch
            description: Event timestamp is valid RFC 3339 in a multi-event batch
            steps:
              - action: init
                params:
                  flush_at: 3
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user_{index}
                    event: test_event_{index}
              - action: flush
              - action: assert_event_field_is_rfc3339
                params:
                  field: timestamp

          - name: distinct_id_is_string_batch
            description: Event distinct_id is a string in a multi-event batch
            steps:
              - action: init
                params:
                  flush_at: 3
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user_{index}
                    event: test_event_{index}
              - action: flush
              - action: assert_event_field_is_string
                params:
                  field: distinct_id

          - name: distinct_id_at_root_not_properties_batch
            description: distinct_id is at event root, not in properties, in a multi-event batch
            steps:
              - action: init
                params:
                  flush_at: 3
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user_{index}
                    event: test_event_{index}
              - action: flush
              - action: assert_event_field_not_in_properties
                params:
                  field: distinct_id

          - name: custom_properties_preserved_batch
            description: Custom properties are sent unchanged for events in a multi-event batch
            steps:
              - action: init
                params:
                  flush_at: 3
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user_{index}
                    event: test_event_{index}
                    properties:
                      custom_string: "hello"
                      custom_number: 42
                      custom_bool: true
              - action: flush
              - action: assert_event_property
                params:
                  property: custom_string
                  expected: "hello"
              - action: assert_event_property
                params:
                  property: custom_number
                  expected: 42
              - action: assert_event_property
                params:
                  property: custom_bool
                  expected: true

          - name: set_properties_preserved_batch
            description: $set is sent as an object for events in a multi-event batch
            steps:
              - action: init
                params:
                  flush_at: 3
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user_{index}
                    event: test_event_{index}
                    properties:
                      $set:
                        name: "Test User"
                        email: "test@example.com"
              - action: flush
              - action: assert_event_property_is_object
                params:
                  property: $set

          - name: set_once_properties_preserved_batch
            description: $set_once is sent as an object for events in a multi-event batch
            steps:
              - action: init
                params:
                  flush_at: 3
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user_{index}
                    event: test_event_{index}
                    properties:
                      $set_once:
                        initial_referrer: "https://google.com"
              - action: flush
              - action: assert_event_property_is_object
                params:
                  property: $set_once

          - name: groups_properties_preserved_batch
            description: $groups is sent as an object for events in a multi-event batch
            steps:
              - action: init
                params:
                  flush_at: 3
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user_{index}
                    event: test_event_{index}
                    properties:
                      $groups:
                        company: "posthog"
              - action: flush
              - action: assert_event_property_is_object
                params:
                  property: $groups

          - name: sdk_generates_uuid_if_not_provided_batch
            description: SDK generates a UUID for each event in a multi-event batch
            steps:
              - action: init
                params:
                  flush_at: 3
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user_{index}
                    event: test_event_{index}
              - action: flush
              - action: assert_event_has_field
                params:
                  field: uuid
              - action: assert_uuid_format
                params:
                  field: uuid
              - action: assert_all_uuids_unique

      batch_behavior:
        description: Batching logic
        tests:
          - name: multiple_events_in_single_batch
            description: Multiple events sent in one request's batch array
            steps:
              - action: init
                params:
                  flush_at: 10
              - action: capture_multiple
                params:
                  count: 5
                  params:
                    distinct_id: test_user
                    event: test_event_{index}
              - action: flush
              - action: assert_request_count
                params:
                  expected: 1
              - action: assert_events_in_batch_count
                params:
                  expected: 5

          - name: batch_envelope_smoke
            description: Request-level envelope (auth header, body format) still holds for a multi-event batch
            steps:
              - action: init
                params:
                  flush_at: 4
              - action: capture_multiple
                params:
                  count: 4
                  params:
                    distinct_id: test_user_{index}
                    event: test_event_{index}
              - action: flush
              - action: assert_request_count
                params:
                  expected: 1
              - action: assert_events_in_batch_count
                params:
                  expected: 4
              - action: assert_authorization_bearer_token
              - action: assert_v1_body_format

          - name: flush_with_no_events_sends_nothing
            description: Flushing with no pending events sends no request
            steps:
              - action: init
              - action: flush
              - action: assert_request_count
                params:
                  expected: 0

          - name: flush_at_triggers_batch
            description: Reaching flush_at threshold triggers a send
            steps:
              - action: init
                params:
                  flush_at: 3
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user
                    event: test_event_{index}
              - action: wait
                params:
                  duration_ms: 1000
              - action: assert_request_count_gte
                params:
                  expected: 1

          - name: created_at_reflects_batch_creation_time
            description: created_at is close to actual wall-clock time (within 5s)
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_v1_created_at_recent
                params:
                  max_age_seconds: 5

      deduplication:
        description: UUID uniqueness and preservation
        tests:
          - name: generates_unique_uuids
            description: Multiple events each have a unique UUID
            steps:
              - action: init
              - action: capture_multiple
                params:
                  count: 5
                  params:
                    distinct_id: test_user
                    event: test_event_{index}
              - action: flush
              - action: assert_all_uuids_unique

          - name: different_events_same_content_different_uuids
            description: Events with identical content get different UUIDs
            steps:
              - action: init
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
                  properties:
                    key: value
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
                  properties:
                    key: value
              - action: flush
              - action: assert_different_uuids

          - name: preserves_uuid_on_retry
            description: Same event UUIDs across retry attempts
            steps:
              - action: configure_mock_responses
                params:
                  responses:
                    - status_code: 503
                    - status_code: 200
              - action: init
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: wait
                params:
                  duration_ms: 5000
              - action: assert_uuid_preserved_on_retry

          - name: preserves_timestamp_on_retry
            description: Same event timestamps across retry attempts
            steps:
              - action: configure_mock_responses
                params:
                  responses:
                    - status_code: 503
                    - status_code: 200
              - action: init
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: wait
                params:
                  duration_ms: 5000
              - action: assert_timestamp_preserved_on_retry

          - name: preserves_uuid_and_timestamp_on_batch_retry
            description: All events in a retried batch keep original UUIDs and timestamps
            steps:
              - action: configure_mock_responses
                params:
                  responses:
                    - status_code: 503
                    - status_code: 200
              - action: init
                params:
                  flush_at: 10
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user
                    event: test_event_{index}
              - action: flush
              - action: wait
                params:
                  duration_ms: 5000
              - action: assert_request_count_gte
                params:
                  expected: 2
              - action: assert_uuid_preserved_on_retry
              - action: assert_timestamp_preserved_on_retry
              - action: assert_no_duplicate_events_in_batch

          - name: no_duplicate_events_in_batch
            description: No duplicate UUIDs within a single batch
            steps:
              - action: init
                params:
                  flush_at: 10
              - action: capture_multiple
                params:
                  count: 5
                  params:
                    distinct_id: test_user
                    event: test_event_{index}
              - action: flush
              - action: assert_request_count_gte
                params:
                  expected: 1
              - action: assert_no_duplicate_events_in_batch

      header_behavior_on_retry:
        description: V1-specific header semantics during retries
        tests:
          - name: attempt_header_starts_at_one
            description: First request has PostHog-Attempt 1
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_header_is_integer
                params:
                  header: PostHog-Attempt
                  expected: 1

          - name: attempt_header_increments_on_retry
            description: PostHog-Attempt increments by 1 on each retry (1, 2, 3...)
            steps:
              - action: configure_mock_responses
                params:
                  responses:
                    - status_code: 503
                    - status_code: 503
                    - status_code: 200
              - action: init
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: wait
                params:
                  duration_ms: 10000
              - action: assert_request_count_gte
                params:
                  expected: 3
              - action: assert_attempt_header_increments

          - name: request_id_preserved_on_retry
            description: PostHog-Request-Id is identical across retries of same request
            steps:
              - action: configure_mock_responses
                params:
                  responses:
                    - status_code: 503
                    - status_code: 200
              - action: init
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: wait
                params:
                  duration_ms: 5000
              - action: assert_request_count_gte
                params:
                  expected: 2
              - action: assert_request_id_preserved_on_retry

          - name: different_requests_have_different_request_ids
            description: Two independent flushes produce different PostHog-Request-Id values
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event_1
              - action: flush
              - action: wait
                params:
                  duration_ms: 1000
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event_2
              - action: flush
              - action: wait
                params:
                  duration_ms: 1000
              - action: assert_request_count_gte
                params:
                  expected: 2
              - action: assert_different_request_ids

          - name: request_timestamp_changes_on_retry
            description: PostHog-Request-Timestamp is updated on each retry attempt
            steps:
              - action: configure_mock_responses
                params:
                  responses:
                    - status_code: 503
                    - status_code: 200
              - action: init
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: wait
                params:
                  duration_ms: 5000
              - action: assert_request_count_gte
                params:
                  expected: 2
              - action: assert_request_timestamp_changes_on_retry

      response_format_validation:
        description: V1 200 and error response format validation
        tests:
          - name: success_response_has_uuid_keyed_results
            description: 200 response body has results as a UUID-keyed map
            steps:
              - action: init
                params:
                  flush_at: 1
              - action: capture
                params:
                  distinct_id: test_user
                  event: test_event
              - action: flush
              - action: assert_v1_response_status
                params:
                  expected: 200
              - action: assert_v1_response_has_results_map

          - name: success_response_has_ok_for_each_event
            description: Each event UUID in the results map has result "ok"
            steps:
              - action: init
                params:
                  flush_at: 10
              - action: capture_multiple
                params:
                  count: 3
                  params:
                    distinct_id: test_user
                    event: test_event_{index}
              - action: flush
              - action: assert_v1_response_has_results_map
              - action: assert_v1_all_events_result
                params:
                  expected_result: ok
              - action: assert_v1_response_results_count
                params:
                  expected: 3

          - name: success_no_retry_after_when_all_ok
            description: Retry-After header is absent when all events have result "ok"
            steps:
              - action: configure_mock_responses
                params:
                  responses:
                    - v1_event_results: ["ok", "ok"]
              - action: init
                params:
                  flush_at: 10
              - action: capture_multiple
                params:
                  count: 2
                  params:
                    distinct_id: test_user
                    event: test_event_{index}
              - action: flush
              - action: assert_v1_retry_after_absent

          - name: success_retry_after_present_when_retry_events
