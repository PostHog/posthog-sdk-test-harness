  # Mock server configuration actions
  configure_mock_responses:
    description: Configure mock server to return specific responses
    params:
      responses:
        type: array
        required: true
        items:
          type: object
          properties:
            status_code:
              type: integer
              default: 200
            headers:
              type: object
              default: {}
            body:
              type: string
              optional: true
            v1_event_results:
              type: array
              optional: true
              description: >
                V1 partial batch: per-event results by position. Each entry
                is a string shorthand ("ok", "retry", "drop", "limited") or
                a dict with explicit "result" and optional "details". Generates
                a 200 response with UUID-keyed results map
                {"results": {"<uuid>": {"result": "...", "details": "..."}}}.
                Retry-After header is auto-added when any result is "retry".

  # Timing actions
  wait:
    description: Wait for a specified duration
    params:
      duration_ms:
        type: integer
        required: true
        description: Duration to wait in milliseconds

  # Assertion actions - Request level
  assert_request_count:
    description: Assert exact number of HTTP requests made to mock server
    params:
      expected:
        type: integer
        required: true

  assert_request_count_gte:
    description: Assert number of requests is greater than or equal to expected
    params:
      expected:
        type: integer
        required: true

  # Assertion actions - Event level
  assert_event_field:
    description: Assert a specific field value in the first captured event
    params:
      field:
        type: string
        required: true
        description: Field name (e.g., 'event', 'distinct_id')
      expected:
        type: any
        required: true
        description: Expected field value

  assert_event_has_field:
    description: Assert that an event has a specific field
    params:
      field:
        type: string
        required: true

  assert_event_property:
    description: Assert event properties
    params:
      property:
        type: string
        required: true
        description: Property name (e.g., '$lib')
      exists:
        type: boolean
        optional: true
        description: Check if property exists
      expected:
        type: any
        optional: true
        description: Expected property value

  # Assertion actions - UUID validation
  assert_uuid_format:
    description: Assert that a field contains a valid UUID
    params:
      field:
        type: string
        required: true

  assert_all_uuids_unique:
    description: Assert all captured events have unique UUIDs
    params: {}

  assert_uuid_preserved_on_retry:
    description: Assert that UUIDs are the same across retry attempts
    params: {}

  assert_different_uuids:
    description: Assert that multiple events have different UUIDs
    params: {}

  # Assertion actions - Token/Auth
  assert_token_present:
    description: Assert that API token is present in requests
    params:
      expected:
        type: string
        required: true
        description: Expected token value

  # Assertion actions - Retry behavior
  assert_final_success:
    description: Assert that at least one request succeeded
    params:
      success_statuses:
        type: array
        optional: true
        description: List of success status codes (default [200])

  assert_retry_delay:
    description: Assert that retry delay meets minimum requirement
    params:
      min_delay_ms:
        type: integer
        required: true
        description: Minimum delay in milliseconds between retries

  assert_backoff_implemented:
    description: Assert that exponential backoff is implemented
    params:
      min_first_delay_ms:
        type: integer
        required: true
        description: Minimum delay for first retry in milliseconds

  # Assertion actions - Decide (Feature Flags)
  assert_flags_request_count:
    description: Assert exact number of /flags requests made to mock server
    params:
      expected:
        type: integer
        required: true

  assert_flags_request_field:
    description: Assert a field value in the /flags request body (supports dot notation for nested fields)
    params:
      field:
        type: string
        required: true
        description: Field path using dot notation (e.g., 'person_properties.$device_id')
      expected:
        type: any
        required: true
        description: Expected field value

  assert_flags_request_query_param:
    description: Assert a query parameter value on the first /flags request
    params:
      param:
        type: string
        required: true
        description: Query parameter name (e.g., 'v')
      expected:
        type: string
        required: true
        description: Expected query parameter value (string, since URL params are always strings)

  assert_event_count_with_name:
    description: >
      Assert the number of captured events whose `event` field equals the given name,
      across all recorded capture-path requests (not just the first batch).
    params:
      name:
        type: string
        required: true
        description: Event name to match (e.g., '$feature_flag_called')
      expected:
        type: integer
        required: true
        description: Expected count

  assert_event_property_in_named_event:
    description: >
      Find the first captured event whose `event` field equals event_name and assert
      a property on it. Searches across all capture-path requests (skipping /flags).
    params:
      event_name:
        type: string
        required: true
        description: Event name to find (e.g., '$feature_flag_called')
      property:
        type: string
        required: true
        description: Property name on the event's `properties` dict
      expected:
        type: any
        required: true
        description: Expected property value

  assert_action_result:
    description: >
      Assert the return value of the most recent non-assertion action (typically the
      adapter call that immediately preceded this assertion). Optionally extract a
      single field from a dict result before comparing.
    params:
      expected:
        type: any
        required: true
        description: Expected value
      field:
        type: string
        optional: true
        description: When the result is a dict, compare expected against result[field]

  # Assertion actions - Headers and Format
  assert_request_has_header:
    description: Assert that HTTP requests contain a specific header
    params:
      header:
        type: string
        required: true
        description: Header name (case-insensitive)
      expected:
        type: string
        optional: true
        description: Expected header value (if omitted, just checks presence)

  assert_batch_format:
    description: Assert that requests use proper batch format
    params:
      has_api_key_field:
        type: boolean
        optional: true
        description: Check for api_key at root level
      has_batch_array:
        type: boolean
        optional: true
        description: Check for batch array field

  # V1 Path Assertions
  assert_request_path:
    description: Assert all requests hit a specific path
    params:
      expected:
        type: string
        required: true
        description: Expected request path (e.g. /i/v1/analytics/events)

  assert_no_requests_to_paths:
    description: Assert no requests were made to any of the listed paths
    params:
      paths:
        type: array
        required: true
        description: List of forbidden paths

  # V1 Header Assertions
  assert_header_value_matches:
    description: Assert a header value matches a regex pattern
    params:
      header:
        type: string
        required: true
        description: Header name (case-insensitive)
      pattern:
        type: string
        required: true
        description: Regex pattern to match against
      optional:
        type: boolean
        optional: true
        description: If true, pass when header is absent (default false)

  assert_header_is_uuid:
    description: Assert a header value is a valid UUID
    params:
      header:
        type: string
        required: true

  assert_header_is_rfc3339:
    description: Assert a header value is a valid RFC 3339 timestamp
    params:
      header:
        type: string
        required: true

  assert_header_is_integer:
    description: Assert a header value is a valid integer
    params:
      header:
        type: string
        required: true
      expected:
        type: integer
        optional: true
        description: Expected exact integer value

  assert_authorization_bearer_token:
    description: >
      Assert Authorization header uses Bearer scheme with the expected token.
      V1 capture uses Authorization: Bearer <project-api-key> only.
    params:
      expected:
        type: string
        optional: true
        description: Expected bearer token value (if omitted, just checks Bearer scheme)

  # V1 Body Assertions
  assert_v1_body_format:
    description: Assert V1 body has created_at (RFC 3339) and batch (non-empty array)
    params: {}

  assert_body_field_absent:
    description: Assert specific fields are absent from body root
    params:
      fields:
        type: array
        required: true
        description: List of field names that must not be present

  assert_v1_created_at_recent:
    description: Assert V1 body created_at is within max_age_seconds of now
    params:
      max_age_seconds:
        type: integer
        optional: true
        description: Maximum age in seconds (default 5)

  # V1 Event Assertions
  assert_v1_event_format:
    description: Assert all events have V1 required root fields (event, uuid, distinct_id, timestamp)
    params: {}

  assert_event_field_is_rfc3339:
    description: Assert an event field is a valid RFC 3339 timestamp
    params:
      field:
        type: string
        required: true

  assert_event_field_is_string:
    description: Assert an event field is a string
    params:
      field:
        type: string
        required: true

  assert_event_field_not_in_properties:
    description: Assert a field exists at event root but not inside properties
    params:
      field:
        type: string
        required: true

  assert_event_property_is_object:
    description: Assert an event property value is an object
    params:
      property:
        type: string
        required: true

  assert_events_in_batch_count:
    description: Assert the number of events in the first batch
    params:
      expected:
        type: integer
        required: true
      operator:
        type: string
        optional: true
        description: Comparison operator (eq or gte, default eq)

  # V1 Header Retry Assertions
  assert_attempt_header_increments:
    description: Assert PostHog-Attempt increments across retry attempts (1, 2, 3...)
    params: {}

  assert_request_id_preserved_on_retry:
    description: Assert PostHog-Request-Id is identical across retry attempts
    params: {}

  assert_request_timestamp_changes_on_retry:
    description: Assert PostHog-Request-Timestamp differs between retry attempts
    params: {}

  assert_different_request_ids:
    description: Assert two independent requests have different PostHog-Request-Id values
    params: {}

  # V1 Partial Batch Assertions
  assert_partial_batch_retry_pruning:
    description: Assert retried batch only contains events with result "retry" from partial response
    params: {}

  # V1 Compression Assertions
  assert_header_absent:
    description: Assert a specific header is NOT present in the request
    params:
      header:
        type: string
        required: true

  assert_compressed_body_decompressible:
    description: Assert the mock server could decompress the body and parse events
    params: {}

  # V1 Response Assertions
  #
  # Note: assert_v1_error_response_format, assert_v1_error_tag, and
  # assert_v1_per_event_result are available as infrastructure but are NOT
  # used in the base SDK compliance suite. They test mock/server response
  # fidelity, not SDK behavior. The SDK compliance tests verify behavioral
  # reactions (retry vs. don't retry) rather than response body contents.

  assert_v1_error_response_format:
    description: >
      Assert a non-200 V1 response body has the structured error shape
      {"error", "error_description", "error_uri"}, all strings.
      Not used in base SDK compliance tests (tests mock fidelity, not SDK behavior).
    params: {}

  assert_v1_error_tag:
    description: >
      Assert the "error" field in a V1 error response matches an expected tag.
      Not used in base SDK compliance tests (tests mock fidelity, not SDK behavior).
    params:
      expected:
        type: string
        required: true
        description: Expected error tag value

  assert_v1_per_event_result:
    description: >
      Assert a per-event result in a V1 200 response. Looks up the event by UUID
      in the UUID-keyed results map and checks result and optionally details.
      Not used in base SDK compliance tests (tests mock fidelity, not SDK behavior).
    params:
      uuid:
        type: string
        required: true
        description: Event UUID to look up
      expected_result:
        type: string
        required: true
        description: Expected result value (ok, drop, limited, retry)
      expected_details:
        type: string
        optional: true
        description: Expected details value

  assert_v1_all_events_result:
    description: Assert every event in the V1 results map has the expected result value
    params:
      expected_result:
        type: string
        required: true
        description: Expected result value for all events

  assert_v1_retry_after_present:
    description: Assert the first response includes a Retry-After header
    params: {}

  assert_v1_retry_after_absent:
    description: Assert the first response does NOT include a Retry-After header
    params: {}

  assert_v1_response_echoes_request_id:
    description: Assert the response PostHog-Request-Id matches the request header
    params: {}

  assert_sdk_did_not_retry:
    description: Assert exactly one capture request was made (SDK did not retry)
    params: {}

  assert_v1_response_has_results_map:
    description: Assert a V1 200 response body has a "results" key whose value is a dict
    params: {}

  assert_v1_response_results_count:
    description: Assert the number of entries in the V1 results map
    params:
      expected:
        type: integer
        required: true

  assert_v1_response_status:
    description: Assert the HTTP status code recorded for the first capture request
    params:
      expected:
        type: integer
        required: true

